name: digikul_student_app
description: "Digi-Kul Student Mobile Application - Audio-first, offline-capable educational platform"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Core UI
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Networking
  dio: ^5.4.3
  connectivity_plus: ^6.0.3

  # Local Storage & Offline
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.2.3
  path_provider: ^2.1.3

  # Background Sync
  workmanager: ^0.5.2

  # WebRTC & Realtime
  flutter_webrtc: ^0.9.48
  socket_io_client: ^2.0.3+1

  # Audio
  just_audio: ^0.9.40
  audio_session: ^0.1.21

  # Push Notifications
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.3
  firebase_core: ^3.8.1

  # Navigation
  go_router: ^14.2.7

  # UI Enhancements
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  lottie: ^3.1.2
  flutter_svg: ^2.0.10+1
  fl_chart: ^0.69.0
  google_fonts: ^6.2.1

  # File Handling
  open_file: ^3.3.2
  permission_handler: ^11.3.1
  file_picker: ^8.1.2

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.2
  logger: ^2.4.0
  package_info_plus: ^8.0.2
  device_info_plus: ^10.1.2
  path: ^1.9.0

  # Freezed (immutable models)
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code Generation
  build_runner: ^2.4.12
  riverpod_generator: ^2.4.3
  freezed: ^2.5.2
  json_serializable: ^6.8.0

  # Testing
  mocktail: ^1.0.4
  integration_test:
    sdk: flutter

  # Linting
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
