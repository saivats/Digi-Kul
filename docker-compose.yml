services:
  backend:
    build:
      context: .
    env_file:
      - path: .env
        required: false
    environment:
      FLASK_ENV: production
      FLASK_DEBUG: "False"
      SOCKETIO_ASYNC_MODE: eventlet
      UPLOAD_FOLDER: /app/uploads
      COMPRESSED_FOLDER: /app/compressed
      RECORDING_DIRECTORY: /app/recordings
    ports:
      - "5000:5000"
    volumes:
      - digikul_uploads:/app/uploads
      - digikul_compressed:/app/compressed
      - digikul_recordings:/app/recordings
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:5000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  digikul_uploads:
  digikul_compressed:
  digikul_recordings:
